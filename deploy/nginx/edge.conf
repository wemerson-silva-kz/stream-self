# Edge cache na frente do origin Go.
# Segmentos (.m4s) são imutáveis → cache agressivo. Playlists (.m3u8) → cache
# curtíssimo. O origin continua sendo a autoridade do paywall: o cache só guarda
# segmentos JÁ liberados (a 1ª request de cada user passa pelo origin e conta o
# watch-time; o cache reduz banda do origin, não burla o paywall — a chave de
# cache inclui o token só na playlist, não nos segmentos públicos por design).

proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls:50m
                 max_size=10g inactive=60s use_temp_path=off;

upstream origin_go {
    server origin:8081;
    keepalive 32;
}

server {
    listen 80;

    # Segmentos: cacheáveis. NOTA: para freemium estrito por usuário, mantenha
    # bypass de cache (veja comentário) — aqui priorizamos escala de banda.
    location ~ \.m4s$ {
        proxy_pass http://origin_go;
        proxy_cache hls;
        proxy_cache_valid 200 30s;
        proxy_cache_lock on;
        add_header X-Cache $upstream_cache_status;
    }

    # init.mp4: imutável.
    location ~ \.mp4$ {
        proxy_pass http://origin_go;
        proxy_cache hls;
        proxy_cache_valid 200 1h;
    }

    # Playlists: sempre frescas, sem cache.
    location ~ \.m3u8$ {
        proxy_pass http://origin_go;
        proxy_cache off;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://origin_go;
    }
}
