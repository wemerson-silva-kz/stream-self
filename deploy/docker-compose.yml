# Stack de desenvolvimento/MVP: tudo num host.
# Em produção, separe edges (nginx+origin), chat (N réplicas) e transcode (GPU).
name: streamself

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamself
      POSTGRES_PASSWORD: streamself
      POSTGRES_DB: streamself
    ports: ["5433:5432"]   # host 5433 -> evita conflito com Postgres local; rede interna continua 5432
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamself"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]

  # --- Plano de dados Go ---------------------------------------------------

  chat:
    build: { context: ../services, dockerfile: Dockerfile, args: { SVC: chat } }
    environment:
      CHAT_ADDR: ":8082"
      REDIS_ADDR: "redis:6379"
      STREAM_JWT_SECRET: "${STREAM_JWT_SECRET:-dev_stream_secret_0123456789_abcdefghijklmnop}"
    ports: ["8082:8082"]
    depends_on: [redis]

  origin:
    build: { context: ../services, dockerfile: Dockerfile, args: { SVC: origin } }
    environment:
      ORIGIN_ADDR: ":8081"
      REDIS_ADDR: "redis:6379"
      STREAM_JWT_SECRET: "${STREAM_JWT_SECRET:-dev_stream_secret_0123456789_abcdefghijklmnop}"
      MEDIA_ROOT: "/srv/media"
    volumes: ["media:/srv/media"]
    depends_on: [redis]
    # exposto via nginx (edge), não diretamente

  persist:
    build: { context: ../services, dockerfile: Dockerfile, args: { SVC: persist } }
    environment:
      REDIS_ADDR: "redis:6379"
      DATABASE_URL: "postgres://streamself:streamself@postgres:5432/streamself"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  ingest:
    build: { context: ../services, dockerfile: Dockerfile.ingest }
    environment:
      MEDIA_ROOT: "/srv/media"
      FFMPEG_ENCODER: "libx264"        # h264_nvenc se houver GPU
      LARAVEL_INTERNAL_URL: "http://host.docker.internal:8000/internal"
      INTERNAL_SECRET: "${INTERNAL_SECRET:-dev-internal-secret}"
      INGEST_INPUT: "srt://0.0.0.0:9000?mode=listener"
    ports: ["9000:9000/udp"]            # SRT
    volumes: ["media:/srv/media"]
    # OBS aponta p/ srt://SEU_IP:9000?streamid=<stream_key>

  # --- Edge cache p/ segmentos LL-HLS -------------------------------------

  edge:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["8085:80"]
    depends_on: [origin]

volumes:
  pgdata:
  redisdata:
  media:
